<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 70" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&amp;family=Montserrat:wght@300;400;500&amp;display=swap');
  </style>
  <!-- Woven textile-inspired separator -->
  <text x="190" y="28" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-weight="400" font-size="26" fill="#2c2c2c" letter-spacing="0.15em">GABRIELA</text>
  <!-- Three thin parallel lines like textile threads -->
  <line x1="80" y1="37" x2="300" y2="37" stroke="#C45B3E" stroke-width="0.6"/>
  <line x1="80" y1="40" x2="300" y2="40" stroke="#D4A76A" stroke-width="0.6"/>
  <line x1="80" y1="43" x2="300" y2="43" stroke="#C45B3E" stroke-width="0.6"/>
  <text x="190" y="60" text-anchor="middle" font-family="'Montserrat', Helvetica, sans-serif" font-weight="300" font-size="9" fill="#A0734B" letter-spacing="0.35em">PROJECTS</text>
</svg>
