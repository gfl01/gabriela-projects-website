<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&amp;family=Montserrat:wght@300;400;500;600&amp;display=swap');
  </style>
  <!-- Mixed heritage: Gold + terracotta, textile-inspired corner marks -->
  <!-- Top-left corner motif -->
  <line x1="12" y1="8" x2="36" y2="8" stroke="#C45B3E" stroke-width="1"/>
  <line x1="12" y1="8" x2="12" y2="24" stroke="#C45B3E" stroke-width="1"/>
  <line x1="16" y1="12" x2="28" y2="12" stroke="#b8976a" stroke-width="0.5"/>
  <line x1="16" y1="12" x2="16" y2="20" stroke="#b8976a" stroke-width="0.5"/>
  <!-- Top-right corner motif -->
  <line x1="364" y1="8" x2="388" y2="8" stroke="#C45B3E" stroke-width="1"/>
  <line x1="388" y1="8" x2="388" y2="24" stroke="#C45B3E" stroke-width="1"/>
  <line x1="372" y1="12" x2="384" y2="12" stroke="#b8976a" stroke-width="0.5"/>
  <line x1="384" y1="12" x2="384" y2="20" stroke="#b8976a" stroke-width="0.5"/>
  <!-- Bottom-left corner motif -->
  <line x1="12" y1="72" x2="36" y2="72" stroke="#C45B3E" stroke-width="1"/>
  <line x1="12" y1="56" x2="12" y2="72" stroke="#C45B3E" stroke-width="1"/>
  <line x1="16" y1="68" x2="28" y2="68" stroke="#b8976a" stroke-width="0.5"/>
  <line x1="16" y1="60" x2="16" y2="68" stroke="#b8976a" stroke-width="0.5"/>
  <!-- Bottom-right corner motif -->
  <line x1="364" y1="72" x2="388" y2="72" stroke="#C45B3E" stroke-width="1"/>
  <line x1="388" y1="56" x2="388" y2="72" stroke="#C45B3E" stroke-width="1"/>
  <line x1="372" y1="68" x2="384" y2="68" stroke="#b8976a" stroke-width="0.5"/>
  <line x1="384" y1="60" x2="384" y2="68" stroke="#b8976a" stroke-width="0.5"/>
  <!-- Main text -->
  <text x="200" y="38" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-weight="400" font-size="26" fill="#2c2c2c" letter-spacing="0.18em">GABRIELA</text>
  <text x="200" y="58" text-anchor="middle" font-family="'Montserrat', Helvetica, sans-serif" font-weight="300" font-size="10" fill="#C45B3E" letter-spacing="0.4em">PROJECTS</text>
</svg>
