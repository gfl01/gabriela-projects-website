<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&amp;family=Montserrat:wght@300;400;500&amp;display=swap');
  </style>
  <!-- Architectural icon (like #7) + Alma Bernan text treatment -->
  <g transform="translate(30, 40) scale(1.1)">
    <polyline points="-20,16 0,-14 20,16" stroke="#C45B3E" stroke-width="1.5" fill="none" stroke-linejoin="miter"/>
    <line x1="-14" y1="16" x2="14" y2="16" stroke="#C45B3E" stroke-width="1.5"/>
    <rect x="-5" y="4" width="10" height="12" stroke="#C45B3E" stroke-width="1" fill="none"/>
  </g>
  <!-- Red bar separator -->
  <line x1="72" y1="20" x2="72" y2="58" stroke="#C45B3E" stroke-width="1.5"/>
  <!-- Text -->
  <text x="86" y="38" font-family="'Cormorant Garamond', Georgia, serif" font-weight="400" font-size="30" fill="#2c2c2c" letter-spacing="0.12em">GABRIELA</text>
  <text x="86" y="56" font-family="'Cormorant Garamond', Georgia, serif" font-weight="300" font-size="12" fill="#2c2c2c" letter-spacing="0.35em">PROJECTS</text>
  <!-- Tagline -->
  <text x="86" y="80" font-family="'Cormorant Garamond', Georgia, serif" font-weight="300" font-size="11" fill="#888" font-style="italic" letter-spacing="0.06em">Thoughtfully Designed. Beautifully Built.</text>
</svg>
