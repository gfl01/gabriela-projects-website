<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 105" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&amp;family=Montserrat:wght@300;400;500&amp;display=swap');
  </style>
  <!-- Monogram circle (like #12) + Alma Bernan bar + stacked text + tagline -->
  <circle cx="50" cy="48" r="32" fill="#C45B3E"/>
  <text x="50" y="58" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-weight="400" font-size="28" fill="#fff" letter-spacing="0.05em">GP</text>
  <!-- Red bar separator -->
  <line x1="96" y1="20" x2="96" y2="78" stroke="#C45B3E" stroke-width="1.5"/>
  <!-- GABRIELA large -->
  <text x="112" y="42" font-family="'Cormorant Garamond', Georgia, serif" font-weight="400" font-size="32" fill="#2c2c2c" letter-spacing="0.12em">GABRIELA</text>
  <!-- PROJECTS below -->
  <text x="112" y="62" font-family="'Cormorant Garamond', Georgia, serif" font-weight="300" font-size="13" fill="#2c2c2c" letter-spacing="0.35em">PROJECTS</text>
  <!-- Tagline -->
  <text x="112" y="88" font-family="'Cormorant Garamond', Georgia, serif" font-weight="300" font-size="11" fill="#888" font-style="italic" letter-spacing="0.06em">Thoughtfully Designed. Beautifully Built.</text>
</svg>
