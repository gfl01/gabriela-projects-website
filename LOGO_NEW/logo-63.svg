<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&amp;family=Montserrat:ital,wght@0,400;1,300&amp;display=swap');
    </style>
    <clipPath id="clip56">
      <circle cx="42" cy="55" r="38"/>
    </clipPath>
    <!-- Gold tint -->
    <filter id="gold56">
      <feColorMatrix type="matrix" values="0.093 0.093 0.093 0 0.72
                                           0.137 0.137 0.137 0 0.59
                                           0.193 0.193 0.193 0 0.42
                                           0     0     0     1 0"/>
    </filter>
  </defs>
  <!-- Gold-tinted monogram + terracotta bar + text -->
  <image href="data:image/jpeg;base64," x="4" y="17" width="76" height="76" clip-path="url(#clip56)" filter="url(#gold56)" preserveAspectRatio="xMidYMid meet"/>
  <!-- Terracotta vertical bar -->
  <rect x="95" y="25" width="3" height="70" fill="#C45B3E" rx="1"/>
  <!-- Text -->
  <text x="115" y="50" font-family="'Cormorant Garamond', serif" font-size="26" font-weight="400" fill="#2c2c2c" letter-spacing="5">GABRIELA</text>
  <text x="115" y="78" font-family="'Cormorant Garamond', serif" font-size="26" font-weight="300" fill="#2c2c2c" letter-spacing="5">PROJECTS</text>
</svg>