<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 110" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&amp;family=Montserrat:wght@300;400;500&amp;display=swap');
  </style>
  <!-- Stacked like #18 with Alma Bernan elegance + red accents -->
  <text x="170" y="22" text-anchor="middle" font-family="'Montserrat', Helvetica, sans-serif" font-weight="400" font-size="8" fill="#C45B3E" letter-spacing="0.5em">DESIGN + BUILD</text>
  <!-- Red bar above name -->
  <line x1="120" y1="32" x2="220" y2="32" stroke="#C45B3E" stroke-width="1"/>
  <text x="170" y="62" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-weight="400" font-size="36" fill="#2c2c2c" letter-spacing="0.08em">Gabriela</text>
  <!-- Red bar below name -->
  <line x1="120" y1="72" x2="220" y2="72" stroke="#C45B3E" stroke-width="1"/>
  <text x="170" y="88" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-weight="300" font-size="12" fill="#2c2c2c" letter-spacing="0.4em">PROJECTS</text>
  <!-- Tagline -->
  <text x="170" y="106" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-weight="300" font-size="10" fill="#888" font-style="italic" letter-spacing="0.06em">Crafted Spaces. Elevated Living.</text>
</svg>
