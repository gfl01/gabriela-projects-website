<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&amp;family=Montserrat:ital,wght@0,400;1,300&amp;display=swap');
    </style>
    <clipPath id="clip59">
      <circle cx="200" cy="42" r="40"/>
    </clipPath>
    <!-- Gold tint -->
    <filter id="gold59">
      <feColorMatrix type="matrix" values="0.093 0.093 0.093 0 0.72
                                           0.137 0.137 0.137 0 0.59
                                           0.193 0.193 0.193 0 0.42
                                           0     0     0     1 0"/>
    </filter>
  </defs>
  <!-- Large gold-tinted monogram centered -->
  <image href="gf-monogram.jpeg" x="160" y="2" width="80" height="80" clip-path="url(#clip59)" filter="url(#gold59)" preserveAspectRatio="xMidYMid meet"/>
  <!-- Text below -->
  <text x="200" y="105" font-family="'Cormorant Garamond', serif" font-size="22" font-weight="400" fill="#2c2c2c" letter-spacing="8" text-anchor="middle">GABRIELA</text>
  <text x="200" y="126" font-family="'Cormorant Garamond', serif" font-size="22" font-weight="300" fill="#2c2c2c" letter-spacing="8" text-anchor="middle">PROJECTS</text>
  <text x="200" y="148" font-family="'Montserrat', sans-serif" font-size="7" font-weight="300" font-style="italic" fill="#888" letter-spacing="2" text-anchor="middle">Custom Design + Quality Construction</text>
</svg>