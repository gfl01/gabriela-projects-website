<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 420 140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&amp;family=Montserrat:ital,wght@0,400;1,300&amp;display=swap');
    </style>
    <clipPath id="clip60">
      <circle cx="55" cy="60" r="48"/>
    </clipPath>
    <!-- Copper tint: black→#A0734B, white→white -->
    <filter id="copper">
      <feColorMatrix type="matrix" values="0.120 0.120 0.120 0 0.627
                                           0.190 0.190 0.190 0 0.451
                                           0.235 0.235 0.235 0 0.294
                                           0     0     0     1 0"/>
    </filter>
  </defs>
  <!-- Copper-tinted GF monogram -->
  <image href="gf-monogram.jpeg" x="7" y="12" width="96" height="96" clip-path="url(#clip60)" filter="url(#copper)" preserveAspectRatio="xMidYMid meet"/>
  <!-- Text to the right -->
  <text x="130" y="50" font-family="'Cormorant Garamond', serif" font-size="26" font-weight="400" fill="#2c2c2c" letter-spacing="5">GABRIELA</text>
  <text x="130" y="78" font-family="'Cormorant Garamond', serif" font-size="26" font-weight="300" fill="#2c2c2c" letter-spacing="5">PROJECTS</text>
  <line x1="130" y1="87" x2="400" y2="87" stroke="#A0734B" stroke-width="0.5"/>
  <text x="130" y="102" font-family="'Montserrat', sans-serif" font-size="7" font-weight="300" font-style="italic" fill="#888" letter-spacing="1.5">Custom Design + Quality Construction</text>
</svg>