<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&amp;family=Montserrat:ital,wght@0,400;1,300&amp;display=swap');
    </style>
  </defs>

  <!-- Triple Arch Colonnade (Classical Arcade) -->
  <g transform="translate(110, 8)">
    <!-- Entablature / top beam -->
    <rect x="-5" y="0" width="190" height="6" fill="none" stroke="#b8976a" stroke-width="1.5" rx="0.5"/>
    <line x1="-5" y1="3" x2="185" y2="3" stroke="#b8976a" stroke-width="0.4" opacity="0.3"/>

    <!-- Left arch -->
    <path d="M0,90 L0,32 A28,28 0 0,1 56,32 L56,90"
          fill="none" stroke="#b8976a" stroke-width="2"/>
    <!-- Left arch inner -->
    <path d="M6,90 L6,35 A22,22 0 0,1 50,35 L50,90"
          fill="none" stroke="#b8976a" stroke-width="0.7" opacity="0.45"/>

    <!-- Center arch (slightly taller for emphasis) -->
    <path d="M62,90 L62,28 A28,28 0 0,1 118,28 L118,90"
          fill="none" stroke="#b8976a" stroke-width="2"/>
    <!-- Center arch inner -->
    <path d="M68,90 L68,32 A22,22 0 0,1 112,32 L112,90"
          fill="none" stroke="#b8976a" stroke-width="0.7" opacity="0.45"/>

    <!-- Right arch -->
    <path d="M124,90 L124,32 A28,28 0 0,1 180,32 L180,90"
          fill="none" stroke="#b8976a" stroke-width="2"/>
    <!-- Right arch inner -->
    <path d="M130,90 L130,35 A22,22 0 0,1 174,35 L174,90"
          fill="none" stroke="#b8976a" stroke-width="0.7" opacity="0.45"/>

    <!-- Four columns -->
    <!-- Column 1 (far left) -->
    <rect x="-2" y="6" width="8" height="84" fill="none" stroke="#b8976a" stroke-width="1.2"/>
    <rect x="-3" y="6" width="10" height="4" fill="none" stroke="#b8976a" stroke-width="0.8" rx="0.5"/>
    <rect x="-3" y="86" width="10" height="4" fill="none" stroke="#b8976a" stroke-width="0.8" rx="0.5"/>

    <!-- Column 2 -->
    <rect x="52" y="6" width="8" height="84" fill="none" stroke="#b8976a" stroke-width="1.2"/>
    <rect x="51" y="6" width="10" height="4" fill="none" stroke="#b8976a" stroke-width="0.8" rx="0.5"/>
    <rect x="51" y="86" width="10" height="4" fill="none" stroke="#b8976a" stroke-width="0.8" rx="0.5"/>

    <!-- Column 3 -->
    <rect x="114" y="6" width="8" height="84" fill="none" stroke="#b8976a" stroke-width="1.2"/>
    <rect x="113" y="6" width="10" height="4" fill="none" stroke="#b8976a" stroke-width="0.8" rx="0.5"/>
    <rect x="113" y="86" width="10" height="4" fill="none" stroke="#b8976a" stroke-width="0.8" rx="0.5"/>

    <!-- Column 4 (far right) -->
    <rect x="174" y="6" width="8" height="84" fill="none" stroke="#b8976a" stroke-width="1.2"/>
    <rect x="173" y="6" width="10" height="4" fill="none" stroke="#b8976a" stroke-width="0.8" rx="0.5"/>
    <rect x="173" y="86" width="10" height="4" fill="none" stroke="#b8976a" stroke-width="0.8" rx="0.5"/>

    <!-- Base / stylobate -->
    <rect x="-5" y="90" width="190" height="5" fill="none" stroke="#b8976a" stroke-width="1.5" rx="0.5"/>

    <!-- Column fluting hints -->
    <line x1="2" y1="12" x2="2" y2="84" stroke="#b8976a" stroke-width="0.3" opacity="0.3"/>
    <line x1="56" y1="12" x2="56" y2="84" stroke="#b8976a" stroke-width="0.3" opacity="0.3"/>
    <line x1="118" y1="12" x2="118" y2="84" stroke="#b8976a" stroke-width="0.3" opacity="0.3"/>
    <line x1="178" y1="12" x2="178" y2="84" stroke="#b8976a" stroke-width="0.3" opacity="0.3"/>
  </g>

  <!-- Text centered below the colonnade -->
  <text x="200" y="122" font-family="'Cormorant Garamond', serif" font-size="23" font-weight="300" fill="#2c2c2c" letter-spacing="7" text-anchor="middle">GABRIELA</text>

  <!-- Decorative dots -->
  <circle cx="186" cy="131" r="1" fill="#b8976a" opacity="0.4"/>
  <circle cx="200" cy="131" r="1" fill="#b8976a" opacity="0.4"/>
  <circle cx="214" cy="131" r="1" fill="#b8976a" opacity="0.4"/>

  <text x="200" y="142" font-family="'Cormorant Garamond', serif" font-size="22" font-weight="300" fill="#2c2c2c" letter-spacing="9" text-anchor="middle">PROJECTS</text>

  <!-- Tagline -->
  <text x="200" y="156" font-family="'Montserrat', sans-serif" font-size="7" font-style="italic" font-weight="300" fill="#b8976a" letter-spacing="1.2" text-anchor="middle">Custom Design + Quality Construction</text>
</svg>