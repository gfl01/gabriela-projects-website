<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Options — Round 2 — Gabriela Projects</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #faf8f5; color: #2c2c2c; padding: 40px 20px 80px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 36px; text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; font-weight: 300; font-size: 14px; color: #b8976a; letter-spacing: 0.2em; margin-bottom: 50px; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 24px; text-align: center; margin: 60px 0 10px; color: #2c2c2c; }
    .section-desc { text-align: center; font-weight: 300; font-size: 12px; color: #999; letter-spacing: 0.1em; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
    .card { background: #fff; border-radius: 8px; padding: 40px 30px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
    .card .label { font-size: 11px; font-weight: 500; letter-spacing: 0.15em; color: #b8976a; margin-bottom: 20px; }
    .card .logo-wrap { width: 100%; display: flex; justify-content: center; align-items: center; min-height: 100px; margin-bottom: 16px; }
    .card .logo-wrap img { max-width: 100%; height: auto; }
    .card .desc { font-size: 12px; font-weight: 300; color: #888; text-align: center; line-height: 1.5; }
    .divider { max-width: 1200px; margin: 50px auto 0; border: none; border-top: 1px solid #e0dbd4; }
    @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <h1>Logo Options — Round 2</h1>
  <p class="subtitle">GABRIELA PROJECTS</p>

  <!-- ==================== FINAL 3 PICKS ==================== -->
  <h2 class="section-title" style="color: #b8976a;">&#9679; Logo 56 — Final Picks</h2>
  <p class="section-desc">Your top 3 — shorter bar, no tagline</p>
  <div class="grid">
    <div class="card">
      <span class="label">56 CLEAN</span>
      <div class="logo-wrap"><img src="logo-63.svg" alt="Logo 63"></div>
      <p class="desc">Gold monogram + terracotta bar</p>
    </div>
    <div class="card">
      <span class="label">56-A: BLACK + GOLD</span>
      <div class="logo-wrap"><img src="logo-64.svg" alt="Logo 64"></div>
      <p class="desc">Black monogram + gold vertical bar</p>
    </div>
    <div class="card">
      <span class="label">56-D: COPPER</span>
      <div class="logo-wrap"><img src="logo-67.svg" alt="Logo 67"></div>
      <p class="desc">Copper monogram + copper bar</p>
    </div>
  </div>

</body>
</html>
