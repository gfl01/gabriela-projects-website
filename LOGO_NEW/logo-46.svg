<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&amp;family=Montserrat:ital,wght@0,400;1,300&amp;display=swap');
    </style>
  </defs>

  <!-- Pointed Gothic / Lancet Arch -->
  <g transform="translate(165, 5)">
    <!-- Outer pointed arch -->
    <path d="M0,100 L0,45 Q0,12 35,2 Q70,12 70,45 L70,100"
          fill="none" stroke="#b8976a" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Inner pointed arch -->
    <path d="M10,100 L10,48 Q10,20 35,10 Q60,20 60,48 L60,100"
          fill="none" stroke="#b8976a" stroke-width="1" opacity="0.5"/>
    <!-- Trefoil ornament at top of inner arch -->
    <circle cx="35" cy="22" r="5" fill="none" stroke="#b8976a" stroke-width="0.7" opacity="0.5"/>
    <circle cx="29" cy="28" r="4" fill="none" stroke="#b8976a" stroke-width="0.7" opacity="0.4"/>
    <circle cx="41" cy="28" r="4" fill="none" stroke="#b8976a" stroke-width="0.7" opacity="0.4"/>
    <!-- Gothic tracery line -->
    <line x1="35" y1="27" x2="35" y2="50" stroke="#b8976a" stroke-width="0.6" opacity="0.4"/>
    <!-- Column shafts -->
    <line x1="3" y1="45" x2="3" y2="98" stroke="#b8976a" stroke-width="0.5" opacity="0.4"/>
    <line x1="67" y1="45" x2="67" y2="98" stroke="#b8976a" stroke-width="0.5" opacity="0.4"/>
    <!-- Impost moldings -->
    <rect x="-3" y="42" width="12" height="4" fill="none" stroke="#b8976a" stroke-width="0.8" rx="0.5"/>
    <rect x="61" y="42" width="12" height="4" fill="none" stroke="#b8976a" stroke-width="0.8" rx="0.5"/>
    <!-- Base line -->
    <line x1="-5" y1="100" x2="75" y2="100" stroke="#b8976a" stroke-width="2"/>
    <!-- Finial at peak -->
    <line x1="35" y1="2" x2="35" y2="-3" stroke="#b8976a" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="35" cy="-5" r="1.5" fill="#b8976a" opacity="0.6"/>
  </g>

  <!-- Text centered below the arch -->
  <text x="200" y="124" font-family="'Cormorant Garamond', serif" font-size="23" font-weight="300" fill="#2c2c2c" letter-spacing="7" text-anchor="middle">GABRIELA</text>

  <!-- Small diamond separator -->
  <path d="M196,132 L200,129 L204,132 L200,135 Z" fill="#b8976a" opacity="0.4"/>

  <text x="200" y="146" font-family="'Cormorant Garamond', serif" font-size="22" font-weight="300" fill="#2c2c2c" letter-spacing="9" text-anchor="middle">PROJECTS</text>

  <!-- Tagline -->
  <text x="200" y="158" font-family="'Montserrat', sans-serif" font-size="7" font-style="italic" font-weight="300" fill="#b8976a" letter-spacing="1.2" text-anchor="middle">Custom Design + Quality Construction</text>
</svg>