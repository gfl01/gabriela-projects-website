<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 90" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&amp;family=Montserrat:wght@300;400;500&amp;display=swap');
  </style>
  <!-- Filled terracotta circle monogram (like #12) + Alma Bernan text style -->
  <circle cx="40" cy="38" r="28" fill="#C45B3E"/>
  <text x="40" y="47" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-weight="400" font-size="24" fill="#fff" letter-spacing="0.05em">GP</text>
  <!-- Text with red bar separator like Alma -->
  <text x="82" y="32" font-family="'Cormorant Garamond', Georgia, serif" font-weight="400" font-size="28" fill="#2c2c2c" letter-spacing="0.12em">GABRIELA</text>
  <rect x="82" y="40" width="220" height="0.5" fill="#ddd"/>
  <text x="82" y="56" font-family="'Cormorant Garamond', Georgia, serif" font-weight="300" font-size="12" fill="#2c2c2c" letter-spacing="0.35em">PROJECTS</text>
  <!-- Tagline -->
  <text x="82" y="78" font-family="'Cormorant Garamond', Georgia, serif" font-weight="300" font-size="11" fill="#888" font-style="italic" letter-spacing="0.06em">Design. Craft. Transform. Deliver.</text>
</svg>
