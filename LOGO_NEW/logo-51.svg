<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&amp;family=Montserrat:ital,wght@0,400;1,300&amp;display=swap');
    </style>
  </defs>

  <!-- Minimalist Arch Line - the arch sits inline between GABRIELA and PROJECTS -->

  <!-- GABRIELA text on the left -->
  <text x="22" y="82" font-family="'Cormorant Garamond', serif" font-size="24" font-weight="300" fill="#2c2c2c" letter-spacing="5">GABRIELA</text>

  <!-- Minimalist single-line arch between the two words -->
  <g transform="translate(172, 48)">
    <!-- Single thin arch line - elegant and modern -->
    <path d="M0,34 L0,12 A18,16 0 0,1 36,12 L36,34"
          fill="none" stroke="#b8976a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Subtle threshold line -->
    <line x1="-2" y1="34" x2="38" y2="34" stroke="#b8976a" stroke-width="0.8" opacity="0.5"/>
    <!-- Tiny keystone dot -->
    <circle cx="18" cy="0" r="1" fill="#b8976a" opacity="0.5"/>
  </g>

  <!-- PROJECTS text on the right -->
  <text x="222" y="82" font-family="'Cormorant Garamond', serif" font-size="23" font-weight="300" fill="#2c2c2c" letter-spacing="7">PROJECTS</text>

  <!-- Single thin line below -->
  <line x1="22" y1="95" x2="390" y2="95" stroke="#b8976a" stroke-width="0.4" opacity="0.4"/>

  <!-- Tagline centered below -->
  <text x="206" y="112" font-family="'Montserrat', sans-serif" font-size="7.5" font-style="italic" font-weight="300" fill="#b8976a" letter-spacing="1.5" text-anchor="middle">Custom Design + Quality Construction</text>
</svg>