<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&amp;family=Montserrat:ital,wght@0,400;1,300&amp;display=swap');
    </style>
  </defs>

  <!-- Classic Semicircular Arch Doorway -->
  <g transform="translate(55, 18)">
    <!-- Outer arch structure -->
    <path d="M0,120 L0,50 A50,50 0 0,1 100,50 L100,120"
          fill="none" stroke="#b8976a" stroke-width="3" stroke-linecap="round"/>
    <!-- Inner arch opening -->
    <path d="M15,120 L15,58 A35,35 0 0,1 85,58 L85,120"
          fill="none" stroke="#b8976a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Base/threshold line -->
    <line x1="-4" y1="120" x2="104" y2="120" stroke="#b8976a" stroke-width="2.5"/>
    <!-- Impost blocks (where arch meets columns) -->
    <rect x="-2" y="48" width="19" height="6" fill="none" stroke="#b8976a" stroke-width="1.2" rx="0.5"/>
    <rect x="83" y="48" width="19" height="6" fill="none" stroke="#b8976a" stroke-width="1.2" rx="0.5"/>
    <!-- Column fluting detail left -->
    <line x1="5" y1="56" x2="5" y2="118" stroke="#b8976a" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="56" x2="10" y2="118" stroke="#b8976a" stroke-width="0.5" opacity="0.5"/>
    <!-- Column fluting detail right -->
    <line x1="90" y1="56" x2="90" y2="118" stroke="#b8976a" stroke-width="0.5" opacity="0.5"/>
    <line x1="95" y1="56" x2="95" y2="118" stroke="#b8976a" stroke-width="0.5" opacity="0.5"/>
    <!-- Keystone accent -->
    <path d="M44,17 L50,12 L56,17" fill="none" stroke="#b8976a" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Text stacked to the right -->
  <text x="195" y="62" font-family="'Cormorant Garamond', serif" font-size="24" font-weight="300" fill="#2c2c2c" letter-spacing="6">GABRIELA</text>
  <text x="195" y="92" font-family="'Cormorant Garamond', serif" font-size="22" font-weight="300" fill="#2c2c2c" letter-spacing="8">PROJECTS</text>

  <!-- Decorative line between text and tagline -->
  <line x1="195" y1="102" x2="370" y2="102" stroke="#b8976a" stroke-width="0.5" opacity="0.6"/>

  <!-- Tagline -->
  <text x="195" y="118" font-family="'Montserrat', sans-serif" font-size="7" font-style="italic" font-weight="300" fill="#b8976a" letter-spacing="1.5">Custom Design + Quality Construction</text>
</svg>