<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&amp;family=Montserrat:wght@300;400;500&amp;display=swap');
  </style>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" stroke="#2c2c2c" stroke-width="1" fill="none"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="82" stroke="#b8976a" stroke-width="0.5" fill="none"/>
  <!-- GABRIELA curved on top -->
  <defs>
    <path id="topArc" d="M 30,100 a 70,70 0 0,1 140,0" fill="none"/>
    <path id="bottomArc" d="M 170,110 a 70,70 0 0,1 -140,0" fill="none"/>
  </defs>
  <text font-family="'Montserrat', Helvetica, sans-serif" font-weight="400" font-size="11" fill="#2c2c2c" letter-spacing="0.4em">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">GABRIELA</textPath>
  </text>
  <!-- Center decorative line + GP -->
  <line x1="55" y1="95" x2="85" y2="95" stroke="#b8976a" stroke-width="0.5"/>
  <text x="100" y="102" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-weight="400" font-size="22" fill="#2c2c2c">GP</text>
  <line x1="115" y1="95" x2="145" y2="95" stroke="#b8976a" stroke-width="0.5"/>
  <!-- PROJECTS curved on bottom -->
  <text font-family="'Montserrat', Helvetica, sans-serif" font-weight="300" font-size="11" fill="#b8976a" letter-spacing="0.35em">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">PROJECTS</textPath>
  </text>
  <!-- Small diamond accents -->
  <polygon points="100,30 103,35 100,40 97,35" fill="#b8976a"/>
  <polygon points="100,160 103,165 100,170 97,165" fill="#b8976a"/>
</svg>
